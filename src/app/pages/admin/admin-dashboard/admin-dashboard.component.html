<div class="page-wrap admin-dashboard-wrap">
  <header class="admin-header border-bottom bg-white shadow-sm">
    <div class="container py-3 d-flex flex-wrap align-items-center justify-content-between gap-2">
      <div>
        <h1 class="h5 mb-0 fw-bold">Admin dashboard</h1>
        <p class="small text-muted mb-0" *ngIf="adminEmail()">Signed in as {{ adminEmail() }}</p>
      </div>
      <div class="d-flex align-items-center gap-2">
        <a routerLink="/" class="btn btn-outline-secondary btn-sm">Site</a>
        <button type="button" class="btn btn-outline-danger btn-sm" (click)="logout()">Sign out</button>
      </div>
    </div>
  </header>

  <main class="container py-4">
    <section class="card border-0 shadow-sm rounded-3">
      <div class="card-header bg-transparent border-0 py-3">
        <h2 class="h6 fw-bold mb-0">Registered users</h2>
      </div>
      <div class="card-body p-0">
        <div class="alert alert-danger m-3" *ngIf="error()" role="alert">
          {{ error() }}
        </div>
        <div class="p-3 text-muted" *ngIf="loading()">
          Loading...
        </div>
        <div class="table-responsive" *ngIf="!loading() && !error()">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Type</th>
                <th>Registered</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let u of users()">
                <td>{{ u.name }}</td>
                <td>{{ u.email }}</td>
                <td>{{ u.phone || '—' }}</td>
                <td>{{ u.userType || '—' }}</td>
                <td>{{ formatDate(u.createdAt) }}</td>
              </tr>
              <tr *ngIf="users().length === 0">
                <td colspan="5" class="text-muted text-center py-4">No users yet.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </main>
</div>
