<div class="page-wrap admin-login-wrap">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-5">
        <div class="card border-0 shadow-sm rounded-3">
          <div class="card-body p-4 p-md-5">
            <h1 class="h4 fw-bold mb-2">Admin sign in</h1>
            <p class="text-muted small mb-4">BrainWave AI Institute – role-based access</p>

            <div class="alert alert-danger" *ngIf="errorMessage()" role="alert">
              {{ errorMessage() }}
            </div>

            <form (ngSubmit)="onSubmit()" #form="ngForm">
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input
                  type="email"
                  class="form-control"
                  id="email"
                  name="email"
                  [(ngModel)]="model.email"
                  #email="ngModel"
                  required
                  placeholder="admin@example.com"
                />
                <div class="invalid-feedback" *ngIf="email.invalid && email.touched">
                  Email is required.
                </div>
              </div>
              <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input
                  type="password"
                  class="form-control"
                  id="password"
                  name="password"
                  [(ngModel)]="model.password"
                  #password="ngModel"
                  required
                  placeholder="••••••••"
                />
                <div class="invalid-feedback" *ngIf="password.invalid && password.touched">
                  Password is required.
                </div>
              </div>
              <button type="submit" class="btn btn-primary w-100" [disabled]="form.invalid || loading()">
                {{ loading() ? 'Signing in...' : 'Sign in' }}
              </button>
            </form>
            <p class="mt-3 mb-0 small text-muted text-center">
              <a routerLink="/">Back to site</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
